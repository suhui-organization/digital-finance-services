# =============================================================================
# digital-finance-services — Go Backend
# 基础中间件 (postgres/redis/nginx) 由 digital-finance-infra 独立管理
# 使用方式: docker compose up -d
# 前提: infra 服务已就绪 (docker compose -f ../digital-finance-infra/docker-compose.yml up -d)
# =============================================================================
version: "3.8"

services:
  # ---------- Go Backend ----------
  go-backend:
    image: swr.ap-southeast-3.myhuaweicloud.com/digital-finance-commercial/go-backend:${TAG:-latest}
    container_name: df-go-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-16080}:16080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-dfuser}:${POSTGRES_PASSWORD:-dfpass123}@postgres:5432/${POSTGRES_DB:-digital_finance}?sslmode=disable
      REDIS_URL: redis:6379
      AI_SERVICE_URL: http://ai-service:8001
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      PORT: "16080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - df-network

networks:
  df-network:
    name: digital-finance-network
    external: true